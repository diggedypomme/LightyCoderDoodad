plugins { id "com.android.application" }

android {
    namespace "com.lightycoder.doodad"
    compileSdk 36

    defaultConfig {
        applicationId "com.lightycoder.doodad"
        minSdk 26
        targetSdk 36
        versionCode 1
        versionName "0.1"
    }
}
androidComponents {
    onVariants(selector().all()) { variant ->
        variant.outputs.forEach { output ->
            output.outputFileName.set("LightyCoderDoodad.apk")
        }
    }
}
